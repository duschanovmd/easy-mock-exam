<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CAU Mock Exam Portal</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <a class="brand" href="#/student" aria-label="CAU Mock Exam Portal">
          <span class="brand-mark">CAU</span>
          <span>
            <strong>Mock Exam Portal</strong>
            <small>Central Asian University Medical School</small>
          </span>
        </a>
        <nav class="mode-tabs" aria-label="Portal sections">
          <a href="#/student" data-route="student">Student</a>
          <a href="#/professor" data-route="professor">Professor</a>
        </nav>
      </header>

      <main id="app" class="app-main" aria-live="polite"></main>
    </div>

    <template id="loading-template">
      <section class="center-stage">
        <div class="pulse-dot" aria-hidden="true"></div>
        <h1>Loading exam room</h1>
      </section>
    </template>

    <script src="/app.js" defer></script>
  </body>
</html>
